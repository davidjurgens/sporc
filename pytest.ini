[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Registered so that -m "not slow and not integration" selects reliably and
# typos in marker names are errors rather than silent no-ops.
markers =
    unit: fast tests with no external data or network
    slow: tests that take a long time to run
    integration: tests that read a real SPORC parquet layout

addopts = --strict-markers
